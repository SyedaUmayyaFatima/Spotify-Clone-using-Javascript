<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
   
    <title>Spotify- Web Player: Music for Everyone</title>
</head>

<body>
   
    <div class="conatiner flex bg-black">
        <div class="left ">
            <div class="close">
                <img width="30" class="invert" src="close.svg">
            </div>
            <div class="home bg-gray rounded m-1 p-1">
                <div class="logo  invert"><img src="img/img/logo.svg" width="150" alt="Logo"></div>
                <ul>
                    <li><img class="invert" src="home.svg" alt="home">Home</li>
                    <li><img class="invert" src="search.svg" alt="Search">Search</li>
                </ul>
            </div>


            <div class="library bg-gray rounded m-1 p-1">
                <div class="heading">
                    <img class="invert" src="img/img/playlist.svg" alt="">
                    <h2>
                        Your Library
                    </h2>
                </div>

                <div class="songList">

                    <ul>

                    </ul>
                </div>

                <div class="footer">
                    <a href="https://www.spotify.com/pk-en/legal/">Legal</a></li>
                    <a href="https://www.spotify.com/pk-en/safetyandprivacy/">Privacy Center</a></li>
                    <a href="https://www.spotify.com/pk-en/legal/privacy-policy/">Privacy Policy</a></li>
                    <a href="https://www.spotify.com/pk-en/legal/cookies-policy/">Cookies</a></li>
                    <a href="https://www.spotify.com/pk-en/legal/privacy-policy/#s3">About Ads</a></li>
                    <a href="https://www.spotify.com/pk-en/accessibility/">Accessibility</a></li>
                </div>
            </div>

        </div>

        <div class="right bg-gray rounded  p-1">
            <div class="header">
                <div class="nav">
                    <div class="hamburgerCont">
                        <img width="40px" class="invert hamburger" src="img/img/hamburger.svg">
                   
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                        color="currentColor" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18" />
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                    color="currentColor" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18" />
                </svg>
                </div>
                
            </div>
    
                <div class="buttons">
                    <button class="signup-btn">Sign Up</button>
                    <button class="login-btn">Log in</button>
                </div>
            </div>
            <div class="spotify-playlist">
                <h1>Spotify Playlists</h1>
                <div class="cardContainer">
                    
                <div class="playbar">
                    <div class="seekbar">
                        <div class="circle">

                        </div>
                    </div>

                 
                 
                        <div class="songinfo"></div>
                        <div class="songButton">
                            <img width="37" id="previous" src="img/img/prevsong.svg">
                            <img  width="37"id="play" src="img/img/play.svg">
                            <img  width="37"id="next" src="img/img/nextsong.svg">
                        </div>

                        <div class="timevol">
                        <div class="songtime">
                        </div>
                        <div class="volume">
                        
                            
                            <img width="25" src="img/img/volume.svg">
                      
                        <div class="range">
                            <input type="range" name="volume">
                        </div>
                     </div>
                     </div>
                </div>
            </div>
        </div>
    </div>

    </div>
    <script src="script.js"></script>
</body>


</html>
